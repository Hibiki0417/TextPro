{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TextPro</title>
  <link rel="icon" href="{% static 'ocr/textpro-logo.svg' %}" type="image/svg+xml">
  <link rel="stylesheet" href="{% static 'ocr/styles.css' %}">
  <script defer src="{% static 'ocr/app.js' %}"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img class="brand-logo" src="{% static 'ocr/textpro-logo.svg' %}" alt="" width="56" height="56">
      <div>
        <p class="eyebrow">Handwriting OCR</p>
        <h1>TextPro</h1>
      </div>
    </div>
    <span class="status-pill">スマホ対応</span>
  </header>

  <main class="workspace" aria-live="polite">
    <section class="upload-panel" aria-labelledby="upload-title">
      <div class="section-heading">
        <h2 id="upload-title">写真を送信</h2>
        <p>手書きメモを撮って、そのまま読み取れます。</p>
      </div>

      <form id="ocr-form" class="upload-form" method="post" enctype="multipart/form-data" action="{% url 'ocr:transcribe' %}">
        {% csrf_token %}
        <label class="drop-zone" for="image-input">
          <input id="image-input" name="image" type="file" accept="image/jpeg,image/png,image/webp,image/gif" capture="environment" required>
          <span class="drop-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path d="M4 7a3 3 0 0 1 3-3h1.7l1.1 1.6c.2.3.5.4.8.4H17a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7Zm8 10a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0-2a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"/>
            </svg>
          </span>
          <span class="drop-title">写真を選択</span>
          <span id="file-name" class="drop-note">JPEG / PNG / WebP / GIF</span>
        </label>

        <div class="preview-wrap" hidden>
          <img id="image-preview" alt="選択した画像のプレビュー">
        </div>

        <button id="submit-button" class="primary-button" type="submit">
          <svg viewBox="0 0 24 24" role="img" focusable="false" aria-hidden="true">
            <path d="M12 3a1 1 0 0 1 1 1v8.6l2.3-2.3a1 1 0 1 1 1.4 1.4l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.4l2.3 2.3V4a1 1 0 0 1 1-1ZM5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"/>
          </svg>
          <span>テキスト化する</span>
        </button>
      </form>
    </section>

    <section class="result-panel" aria-labelledby="result-title">
      <div class="result-toolbar">
        <div class="section-heading">
          <h2 id="result-title">読み取り結果</h2>
          <p id="result-meta">結果はここに表示されます。</p>
        </div>
        <button id="copy-button" class="icon-button" type="button" disabled aria-label="コピー">
          <svg viewBox="0 0 24 24" role="img" focusable="false" aria-hidden="true">
            <path d="M8 7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3h-1v-2h1a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1H8Zm-4 4a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-6Zm3-1a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1H7Z"/>
          </svg>
        </button>
      </div>
      <textarea id="result-text" placeholder="手書き文字の読み取り結果" spellcheck="false"></textarea>
      <p id="message" class="message" role="status"></p>
    </section>
  </main>
</body>
</html>
