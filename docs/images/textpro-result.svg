<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">TextPro transcription result screen</title>
  <desc id="desc">Screenshot-style preview of TextPro after a handwritten note has been transcribed into copyable text.</desc>
  <rect width="1280" height="760" fill="#f5f7f8"/>
  <g transform="translate(80 56)">
    <rect x="0" y="0" width="1120" height="648" rx="18" fill="#ffffff" opacity="0.55"/>
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#0f766e"/>
    <path d="M18 12h18l8 8v28H18z" fill="#f8fbfc"/>
    <path d="M36 12v7c0 2 1 3 3 3h5" fill="#c9ebe6"/>
    <path d="M22 29c5-6 10-6 14 0 4 5 8 5 12 0" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round"/>
    <path d="M22 39h19" stroke="#33434c" stroke-width="3" stroke-linecap="round"/>
    <text x="72" y="22" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">HANDWRITING OCR</text>
    <text x="72" y="55" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="36" font-weight="800">TextPro</text>
    <rect x="1002" y="12" width="118" height="36" rx="18" fill="#ffffff" stroke="#d9e0e6"/>
    <text x="1028" y="35" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="15">スマホ対応</text>
    <g transform="translate(0 92)">
      <rect width="540" height="500" rx="8" fill="#ffffff" stroke="#d9e0e6"/>
      <text x="28" y="44" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">写真を送信</text>
      <text x="28" y="74" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="16">手書きメモを撮って、そのまま読み取れます。</text>
      <rect x="28" y="110" width="484" height="308" rx="8" fill="#101418"/>
      <rect x="92" y="138" width="356" height="252" rx="6" fill="#fffaf0"/>
      <path d="M142 190c44-28 85-25 126 9 35 29 76 29 122 0" fill="none" stroke="#23343d" stroke-width="10" stroke-linecap="round"/>
      <path d="M142 244h226M142 294h178M142 342h234" stroke="#23343d" stroke-width="10" stroke-linecap="round"/>
      <rect x="28" y="438" width="484" height="54" rx="8" fill="#0f766e"/>
      <text x="221" y="472" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700">テキスト化する</text>
    </g>
    <g transform="translate(580 92)">
      <rect width="540" height="500" rx="8" fill="#ffffff" stroke="#d9e0e6"/>
      <text x="28" y="44" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">読み取り結果</text>
      <text x="28" y="74" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="16">46 文字</text>
      <rect x="468" y="28" width="44" height="44" rx="8" fill="#d9f1ee"/>
      <path d="M486 42h15a4 4 0 0 1 4 4v18a4 4 0 0 1-4 4h-15a4 4 0 0 1-4-4V46a4 4 0 0 1 4-4z" fill="none" stroke="#0b5f59" stroke-width="3"/>
      <path d="M477 51h-2a4 4 0 0 0-4 4v18a4 4 0 0 0 4 4h15a4 4 0 0 0 4-4v-1" fill="none" stroke="#0b5f59" stroke-width="3"/>
      <rect x="28" y="110" width="484" height="308" rx="8" fill="#fbfcfd" stroke="#0f766e"/>
      <text x="52" y="154" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="20">買い物メモ</text>
      <text x="52" y="198" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="20">牛乳 1本</text>
      <text x="52" y="242" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="20">卵 10個</text>
      <text x="52" y="286" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="20">明日 9時に提出</text>
      <text x="28" y="458" fill="#0b5f59" font-family="Segoe UI, sans-serif" font-size="16">読み取りが完了しました。</text>
    </g>
  </g>
</svg>
