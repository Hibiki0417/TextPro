<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">TextPro upload screen</title>
  <desc id="desc">Desktop screenshot-style preview of TextPro with an upload panel and an empty transcription panel.</desc>
  <rect width="1280" height="760" fill="#f5f7f8"/>
  <g transform="translate(80 56)">
    <rect x="0" y="0" width="1120" height="648" rx="18" fill="#ffffff" opacity="0.55"/>
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#0f766e"/>
      <path d="M18 12h18l8 8v28H18z" fill="#f8fbfc"/>
      <path d="M36 12v7c0 2 1 3 3 3h5" fill="#c9ebe6"/>
      <path d="M22 29c5-6 10-6 14 0 4 5 8 5 12 0" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 39h19" stroke="#33434c" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="72" y="22" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">HANDWRITING OCR</text>
    <text x="72" y="55" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="36" font-weight="800">TextPro</text>
    <rect x="1002" y="12" width="118" height="36" rx="18" fill="#ffffff" stroke="#d9e0e6"/>
    <text x="1028" y="35" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="15">スマホ対応</text>
    <g transform="translate(0 92)">
      <rect width="540" height="500" rx="8" fill="#ffffff" stroke="#d9e0e6"/>
      <text x="28" y="44" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">写真を送信</text>
      <text x="28" y="74" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="16">手書きメモを撮って、そのまま読み取れます。</text>
      <rect x="28" y="110" width="484" height="202" rx="8" fill="#eef2f5" stroke="#9aacb8" stroke-width="2" stroke-dasharray="8 8"/>
      <rect x="241" y="146" width="58" height="58" rx="8" fill="#d9f1ee"/>
      <path d="M254 178a3 3 0 0 1 3-3h5l3-5h12l3 5h5a3 3 0 0 1 3 3v16a3 3 0 0 1-3 3h-28a3 3 0 0 1-3-3z" fill="#0b5f59"/>
      <circle cx="271" cy="187" r="7" fill="#d9f1ee"/>
      <text x="224" y="238" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">写真を選択</text>
      <text x="203" y="266" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="15">JPEG / PNG / WebP / GIF</text>
      <rect x="28" y="340" width="484" height="54" rx="8" fill="#0f766e"/>
      <path d="M220 356v18l-7-7-4 4 13 13 13-13-4-4-7 7v-18z" fill="#ffffff"/>
      <text x="251" y="374" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700">テキスト化する</text>
    </g>
    <g transform="translate(580 92)">
      <rect width="540" height="500" rx="8" fill="#ffffff" stroke="#d9e0e6"/>
      <text x="28" y="44" fill="#15191d" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">読み取り結果</text>
      <text x="28" y="74" fill="#66717d" font-family="Segoe UI, sans-serif" font-size="16">結果はここに表示されます。</text>
      <rect x="468" y="28" width="44" height="44" rx="8" fill="#eef2f5"/>
      <path d="M486 42h15a4 4 0 0 1 4 4v18a4 4 0 0 1-4 4h-15a4 4 0 0 1-4-4V46a4 4 0 0 1 4-4z" fill="none" stroke="#33434c" stroke-width="3"/>
      <path d="M477 51h-2a4 4 0 0 0-4 4v18a4 4 0 0 0 4 4h15a4 4 0 0 0 4-4v-1" fill="none" stroke="#33434c" stroke-width="3"/>
      <rect x="28" y="110" width="484" height="308" rx="8" fill="#fbfcfd" stroke="#d9e0e6"/>
